      <article class="poem-article">
        <p>2026.3.25 晚</p>
<p>孤独的情绪反复涌现，</p>
<p>脑海中的笑脸慢慢闪烁。</p>
<p>这一望无际的感受，</p>
<p>想为自己的心找到落脚，</p>
<p>仿佛被某种东西包裹，</p>
<p>在默契的氛围中互相点燃，</p>
<p>任凭情绪蔓延。</p>
<p>于浮现出的画面里，</p>
<p>捕获一张笑脸，</p>
<p>滋润寻常日子。</p>

      </article>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var introRoot = document.querySelector('[data-intro-root]');
    var introTextNode = document.querySelector('[data-intro-text]');
    if (!introRoot || !introTextNode) return;

    var fullText = introTextNode.textContent.trim();
    function applyIntroWidth() {
      if (window.matchMedia('(max-width: 900px)').matches) {
        introRoot.style.width = '100%';
        introRoot.style.maxWidth = '100%';
        return;
      }

      var probe = document.createElement('span');
      var styles = window.getComputedStyle(introRoot);
      probe.textContent = fullText;
      probe.style.position = 'absolute';
      probe.style.visibility = 'hidden';
      probe.style.whiteSpace = 'nowrap';
      probe.style.font = styles.font;
      probe.style.letterSpacing = styles.letterSpacing;
      probe.style.lineHeight = styles.lineHeight;
      document.body.appendChild(probe);
      introRoot.style.width = Math.ceil(probe.getBoundingClientRect().width + 18) + 'px';
      introRoot.style.maxWidth = '100%';
      document.body.removeChild(probe);
    }

    applyIntroWidth();
    window.addEventListener('resize', applyIntroWidth);

    introTextNode.textContent = '';

    var index = 0;
    function step() {
      if (index <= fullText.length) {
        introTextNode.textContent = fullText.slice(0, index);
        var currentChar = fullText.charAt(index - 1);
        index += 1;
        var delay = 155;

        if (currentChar === '，' || currentChar === ',' || currentChar === '、') delay += 320;
        if (currentChar === '。' || currentChar === '！' || currentChar === '？' || currentChar === '～') delay += 460;

        window.setTimeout(step, delay);
        return;
      }

      window.setTimeout(function () {
        introTextNode.textContent = '';
        index = 0;
        window.setTimeout(step, 320);
      }, 1900);
    }

    step();
  });
</script>
